<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | TriSakay</title>
    <link rel="icon" type="image/png" href="image/Logo_Nobg.png" />
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/f8daa09b38.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <img src="image/Logo_Nobg.png" alt="Baliwag City Logo" class="spin-on-hover"/>
    <h1>Welcome</h1>
    <h2>Please Login to Continue</h2>
    <div class="container d-flex justify-content-center">
      <div class="form-group mx-auto text-center">
        <input
          type="email"
          class="form-control rounded-8"
          id="email"
          placeholder="Username"
          style="width: 245px; height: 46px"
        />
      </div>
    </div>

    <div class="container d-flex justify-content-center mt-3">
      <div class="form-group mx-auto text-center">
        <input
          type="password"
          class="form-control rounded-8"
          id="password"
          placeholder="Password"
          style="width: 245px; height: 46px"
        />
      </div>
    </div>
    <div class="container d-flex justify-content-center mt-3">
      <a
        href="#"
        style="color: #f5f5f5"
        onmouseover="this.style.color='#073e5d'"
        onmouseout="this.style.color='#F5F5F5'"
        >Forgot your password?</a
      >
    </div>
    

    <a href="index.html" class="btn btn-default custom-btn">Log in</a>

    <div class="container1 d-flex justify-content-center mt-3">
      <p>
        Don’t have an account?
        <a
          href="signup.html"
          style="color: #f5f5f5"
          onmouseover="this.style.color='#073e5d'"
          onmouseout="this.style.color='#F5F5F5'"
          >Sign up</a
        >.
      </p>
    </div>
    <script>
      document.addEventListener('keydown', function(event) {
  if (event.shiftKey && event.code === 'Digit0') {
    window.location.href = 'driver.html';
  }
});
    </script>
  </body>
</html>
